<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechEvent - Gestión de Eventos</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f0e8;
            color: #1a1a1a;
            padding: 30px 20px;
        }

        h1 {
            text-align: center;
            font-size: 26px;
            color: #1a1a1a;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .card {
            background-color: #ede8dc;
            border: 1px solid #c9c0a8;
            border-radius: 6px;
            padding: 24px;
            margin-bottom: 24px;
            max-width: 860px;
            margin-left: auto;
            margin-right: auto;
        }

        h2 {
            font-size: 17px;
            color: #1a1a1a;
            border-bottom: 2px solid #1a1a1a;
            padding-bottom: 6px;
            margin-bottom: 16px;
        }

        input, select {
            padding: 8px 10px;
            margin: 4px;
            border: 1px solid #aaa;
            border-radius: 4px;
            background: #faf8f3;
            color: #1a1a1a;
            font-size: 14px;
            width: 190px;
        }

        button {
            padding: 8px 18px;
            margin: 4px;
            background-color: #1a1a1a;
            color: #f5f0e8;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background-color: #3a3a3a;
        }

        button.rojo {
            background-color: #7a1a1a;
        }

        button.rojo:hover {
            background-color: #a02020;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            font-size: 14px;
        }

        th {
            background-color: #1a1a1a;
            color: #f5f0e8;
            padding: 9px 10px;
            text-align: left;
        }

        td {
            padding: 8px 10px;
            border-bottom: 1px solid #c9c0a8;
        }

        tr:nth-child(even) td {
            background-color: #e8e2d4;
        }

        .ok  { color: #2a6a2a; font-weight: bold; margin: 6px 0; }
        .err { color: #7a1a1a; font-weight: bold; margin: 6px 0; }
    </style>
</head>
<body>

<h1>TechEvent — Gestión de Eventos</h1>

<!-- REGISTRAR EVENTO -->
<div class="card">
    <h2>Registrar Nuevo Evento</h2>
    <input type="text" id="eventoNombre" placeholder="Nombre del evento">
    <input type="text" id="eventoTipo" placeholder="Tipo (Conferencia, Taller...)">
    <input type="text" id="eventoFecha" placeholder="Fecha (ej: 2024-08-15)">
    <input type="number" id="eventoCapacidad" placeholder="Capacidad">
    <select id="eventoPonenteId">
        <option value="">-- Seleccionar Ponente --</option>
    </select>
    <button onclick="crearEvento()">Registrar Evento</button>
    <p id="mensajeCrear"></p>
</div>

<!-- LISTA DE EVENTOS -->
<div class="card">
    <h2>Lista de Eventos</h2>
    <button onclick="cargarEventos()">Actualizar Lista</button>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Tipo</th>
                <th>Fecha</th>
                <th>Capacidad</th>
                <th>Ponente</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla">
            <tr><td colspan="7">Haz clic en "Actualizar Lista" para cargar los eventos.</td></tr>
        </tbody>
    </table>
</div>

<!-- ELIMINAR EVENTO -->
<div class="card">
    <h2>Eliminar Evento por ID</h2>
    <input type="number" id="eliminarId" placeholder="ID del evento">
    <button class="rojo" onclick="eliminarEvento()">Eliminar</button>
    <p id="mensajeEliminar"></p>
</div>

<script>
    const API = 'http://localhost:8081/api';

    async function cargarPonentes() {
        try {
            const res = await fetch(`${API}/ponentes`);
            const ponentes = await res.json();
            const select = document.getElementById('eventoPonenteId');
            select.innerHTML = '<option value="">-- Seleccionar Ponente --</option>';
            ponentes.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = p.nombre;
                select.appendChild(opt);
            });
        } catch (e) {
            // backend no disponible aun
        }
    }

    async function crearEvento() {
        const nombre = document.getElementById('eventoNombre').value;
        const tipo = document.getElementById('eventoTipo').value;
        const fecha = document.getElementById('eventoFecha').value;
        const capacidad = parseInt(document.getElementById('eventoCapacidad').value);
        const ponenteId = document.getElementById('eventoPonenteId').value;
        const msg = document.getElementById('mensajeCrear');

        if (!nombre || !tipo || !fecha || !capacidad || !ponenteId) {
            msg.textContent = 'Por favor completa todos los campos.';
            msg.className = 'err';
            return;
        }

        const body = {
            nombre: nombre,
            tipo: tipo,
            fecha: fecha,
            capacidad: capacidad,
            ponente: { id: parseInt(ponenteId) }
        };

        const res = await fetch(`${API}/eventos`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        if (res.ok) {
            msg.textContent = 'Evento registrado correctamente.';
            msg.className = 'ok';
            cargarEventos();
        } else {
            msg.textContent = 'Error al registrar el evento.';
            msg.className = 'err';
        }
    }

    async function cargarEventos() {
        const res = await fetch(`${API}/eventos`);
        const eventos = await res.json();
        const tbody = document.getElementById('cuerpoTabla');

        if (eventos.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7">No hay eventos registrados.</td></tr>';
            return;
        }

        let filas = '';
        for (let i = 0; i < eventos.length; i++) {
            const e = eventos[i];
            const nombrePonente = e.ponente ? e.ponente.nombre : 'Sin ponente';
            filas += `<tr>
                <td>${e.id}</td>
                <td>${e.nombre}</td>
                <td>${e.tipo}</td>
                <td>${e.fecha}</td>
                <td>${e.capacidad}</td>
                <td>${nombrePonente}</td>
                <td><button class="rojo" onclick="eliminarEventoDirecto(${e.id})">Eliminar</button></td>
            </tr>`;
        }
        tbody.innerHTML = filas;
    }

    async function eliminarEvento() {
        const id = document.getElementById('eliminarId').value;
        if (!id) return;
        await eliminarEventoDirecto(id);
        document.getElementById('eliminarId').value = '';
    }

    async function eliminarEventoDirecto(id) {
        const res = await fetch(`${API}/eventos/${id}`, { method: 'DELETE' });
        const msg = document.getElementById('mensajeEliminar');
        if (res.ok) {
            msg.textContent = 'Evento ' + id + ' eliminado.';
            msg.className = 'ok';
            cargarEventos();
        } else {
            msg.textContent = 'No se encontró el evento con ID ' + id + '.';
            msg.className = 'err';
        }
    }

    cargarPonentes();
    cargarEventos();
</script>

</body>
</html>
